name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Lint
        run: ruff check src tests scripts
      - name: Test with coverage
        run: pytest -q --cov=src/guard0 --cov-report=xml --cov-fail-under=60
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
      - name: Compile check
        run: python -m compileall src scripts
      - name: Demo script smoke test
        run: python scripts/demo_april_2026.py | head -20

  browser-smoke:
    name: browser smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium
      - name: Browser smoke
        run: python scripts/browser_smoke.py

  docker:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t 0guard:test .
      - name: Test Docker health
        run: |
          docker run -d -p 8109:8109 --name guard-test 0guard:test
          sleep 5
          curl -f http://localhost:8109/api/health || exit 1
          docker stop guard-test
