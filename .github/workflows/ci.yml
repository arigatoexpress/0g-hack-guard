name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Lint
        run: ruff check src tests scripts
      - name: Test
        run: pytest -q
      - name: Compile check
        run: python -m compileall src scripts
      - name: Demo script smoke test
        run: python scripts/demo_april_2026.py | head -20

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t 0guard:test .
      - name: Test Docker health
        run: |
          docker run -d -p 8109:8109 --name guard-test 0guard:test
          sleep 5
          curl -f http://localhost:8109/api/health || exit 1
          docker stop guard-test
