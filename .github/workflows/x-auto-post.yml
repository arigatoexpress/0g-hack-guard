name: Auto-Post Threat Intel to X

on:
  workflow_dispatch:
    inputs:
      live_post_confirm:
        description: "Exact confirmation required for live X posting"
        required: false
        default: "dry-run"

jobs:
  post:
    runs-on: ubuntu-latest
    if: github.repository == 'arigatoexpress/0guard'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Generate content for latest incident
        run: |
          python scripts/generate_content.py --file data/april_2026_incidents.json --severity critical --out /tmp/tweets.json
      - name: Post to X
        env:
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          if [ "${{ vars.X_AUTO_POST_ENABLED }}" = "true" ] && [ "${{ inputs.live_post_confirm }}" = "POST_TO_X_FROM_0GUARD" ]; then
            python scripts/x_post.py --file /tmp/tweets.json --thread --live-post-confirm POST_TO_X_FROM_0GUARD
          else
            echo "Auto-post dry-run. Set X_AUTO_POST_ENABLED=true and pass the exact workflow confirmation to enable."
            python scripts/x_post.py --file /tmp/tweets.json --thread --dry-run
          fi
