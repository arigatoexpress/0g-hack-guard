# Render Blueprint for 0guard
# Deploy: https://dashboard.render.com/blueprint

services:
  - type: web
    name: 0guard
    runtime: docker
    repo: https://github.com/arigatoexpress/0guard
    branch: main
    # Demo-safe default: no paid instance is provisioned from the Blueprint.
    # Upgrade intentionally in the Render dashboard if sustained production uptime is needed.
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8109
